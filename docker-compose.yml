version: "3.8"

services:
  flowcrm:
    image: nginx:alpine
    container_name: flowcrm
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro
    networks:
      - Vizionsnet
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"

      # HTTP -> redireciona pra HTTPS
      - "traefik.http.routers.flowcrm.entrypoints=web"
      - "traefik.http.routers.flowcrm.rule=Host(`app.vizions.com.br`)"
      - "traefik.http.routers.flowcrm.middlewares=flowcrm-https-redirect"

      - "traefik.http.middlewares.flowcrm-https-redirect.redirectscheme.scheme=https"

      # HTTPS
      - "traefik.http.routers.flowcrm-secure.entrypoints=websecure"
      - "traefik.http.routers.flowcrm-secure.rule=Host(`app.vizions.com.br`)"
      - "traefik.http.routers.flowcrm-secure.tls=true"
      - "traefik.http.routers.flowcrm-secure.tls.certresolver=letsencrypt"

      - "traefik.http.routers.flowcrm-secure.service=flowcrm-service"
      - "traefik.http.services.flowcrm-service.loadbalancer.server.port=80"

networks:
  Vizionsnet:
    external: true
  traefik_proxy:
    external: true

version: "3.8"

services:
  flowcrm:
    image: nginx:alpine
    container_name: flowcrm
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro
    networks:
      - Vizionsnet

networks:
  Vizionsnet:
    external: true
```

Faça o commit e push dos dois arquivos para o repositório.

---

## Passo 3 — Gerar Personal Access Token no GitHub

1. GitHub → **Settings** (do seu perfil, não do repo)
2. **Developer settings → Personal access tokens → Tokens (classic)**
3. **Generate new token (classic)**
4. Dê um nome: `portainer-flowcrm`
5. Expiration: `No expiration` (ou o tempo que preferir)
6. Marque apenas: ✅ `repo`
7. Clique em **Generate token**
8. **Copie o token** — começa com `ghp_...` — você só vê uma vez

---

## Passo 4 — Criar o Stack no Portainer via Git

1. Portainer → **Stacks → Add Stack**
2. Nome: `flowcrm`
3. Selecione **Repository** (não Editor)
4. Preencha assim:

| Campo | Valor |
|-------|-------|
| Repository URL | `https://github.com/SEU_USUARIO/flowcrm` |
| Repository reference | `refs/heads/main` |
| Compose path | `docker-compose.yml` |
| Authentication | ✅ ativado |
| Username | seu usuário do GitHub |
| Personal Access Token | `ghp_...` (o token gerado) |

5. Ative **♻️ Automatic updates** se quiser deploy automático a cada push
6. Clique em **Deploy the Stack**

---

## Passo 5 — Deploy automático a cada push (opcional)

Se ativou o **Automatic updates** no passo anterior, configure o intervalo de polling:

- **Polling interval**: `5m` (verifica o repo a cada 5 minutos)

Ou use **Webhook** para deploy instantâneo:
1. Portainer vai gerar uma URL de webhook
2. No GitHub: repo → **Settings → Webhooks → Add webhook**
3. Cole a URL do Portainer
4. Content type: `application/json`
5. Evento: `Just the push event`
6. Save

A partir daí, toda vez que você fizer `git push`, o Portainer atualiza o container automaticamente em segundos.

---

## Fluxo de atualização do FlowCRM
```
Você edita o crm-saas.html
       ↓
git add . && git commit -m "update" && git push
       ↓
Portainer detecta (webhook ou polling)
       ↓
Container atualizado automaticamente 🚀